apiVersion: v1 
kind: Pod 
metadata: 
  name: mypod 
  labels: 
    app: myapp 
    env: devops 
spec:
  volumes: 
  - name: my-vol 
    PersistentVolumeClaim: 
      claimName: mypvc
  containers: 
  - name: nginx-container 
    image: nginx:latest 
    ports: 
    - name: nginx-port 
      containerPort: 80
    volumeMounts: 
    - name: my-vol 
      mountPath: /usr/share/nginx/html/
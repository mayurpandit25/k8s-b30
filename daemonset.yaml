apiVersion: apps/v1 
kind: DaemonSet
metadata: 
  name: my-daemonset 
  labels: 
    app: myapp 
    env: devops 
spec: 
  selector: 
    app: myapp 
  template: 
    metadata: 
      name: daemonset-template 
      labels: 
        app: myapp 
        env: devops
    spec: 
      containers: 
      - name: monitoring-container 
        image: amazon/cloudwatch-agent
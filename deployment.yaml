apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: my-deployment 
  labels: 
    app: myapp 
    env: devops
spec: 
  replicas: 3 
  strategy: 
    type: RollingUpdate
    rollingUpdate: 
      maxSurge: 1
      maxUnavailable: 1
  selector: 
    matchLabels: 
      app: myapp 
  template: 
    metadata: 
      name: deploy-template 
      labels: 
        app: myapp 
        env: devops
    spec: 
      containers: 
      - name: nginx-container 
        image: nginx:latest 
        ports: 
        - name: nginx-port 
          containerPort: 80

        resources: 
          requests: 
            cpu: "100m"
            memory: "128Mi"
          limits: 
            cpu: "200m"
            memory: "256Mi"

        startupProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 10
          failureThreshold: 30

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: deployment-svc 
  labels: 
    app: myapp
    env: devops 
spec: 
  type: NodePort 
  selector: 
    app: myapp 
  ports: 
  - name: deploy-svc-port 
    protocol: TCP 
    port: 80
    targetPort: 80
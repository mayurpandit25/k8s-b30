apiVersion: v1
kind: ReplicationController 
metadata: 
  name: my-rc 
  labels:
    app: myapp 
    env: devops
spec: 
  replicas: 2
  selector: 
    app: myapp
  template: 
    metadata:
      name: rc-template 
      labels: 
        app: myapp
        env: devops
    spec: 
      containers: 
      - name: nginx-container
        image: nginx:latest 
        ports: 
        - name: my-nginx-port
          containerPort: 80
...
---
apiVersion: v1
kind: Service 
metadata: 
  name: my-rc-svc 
  labels: 
    app: myapp 
    env: devops
spec: 
  type: NodePort 
  selector: 
    app: myapp 
  ports: 
  - name: my-rc-svc-port
    protocol: TCP 
    port: 80
    targetPort: 80


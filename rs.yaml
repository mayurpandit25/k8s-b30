apiVersion: apps/v1
kind: ReplicaSet
metadata: 
  name: my-rs 
  labels: 
    app: myapp
    env: devops
spec: 
  replicas: 2
  selector: 
    matchLabels: 
      app: myapp 
  template: 
    metadata: 
      name: my-rs-template 
      labels: 
        app: myapp
        env: devops
    spec: 
      containers: 
      - name: nginx-container 
        image: mayurpandit25/students-frontend:f2
        ports: 
        - name: app-port 
          containerPort: 80
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: rs-svc 
  labels: 
    app: myapp 
    env: devops
spec: 
  type: NodePort 
  selector: 
    app: myapp
  ports: 
  - name: rs-svc-port 
    protocol: TCP
    port: 80
    targetPort: 80
  